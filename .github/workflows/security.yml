name: Security

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "19 3 * * 1"
  workflow_dispatch:

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  container-and-repo-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: ./scripts/build-image.sh --image ai-agent-sandbox:security

      - name: Export image archive
        run: ./scripts/export-image-artifacts.sh --image ai-agent-sandbox:security --output-dir dist/security-artifacts

      - name: Hadolint
        run: docker run --rm -i hadolint/hadolint < Containerfile

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | \
            sudo tee /usr/share/keyrings/trivy.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy filesystem scan
        run: trivy fs --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed .

      - name: Trivy image scan
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed ai-agent-sandbox:security

      - name: Install Syft
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate SBOM
        run: syft docker:ai-agent-sandbox:security -o spdx-json=dist/security-artifacts/ai-agent-sandbox-security.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign archive checksum
        run: |
          cosign sign-blob --yes \
            --output-signature dist/security-artifacts/ai-agent-sandbox_security.tar.sha256.sig \
            --output-certificate dist/security-artifacts/ai-agent-sandbox_security.tar.sha256.pem \
            dist/security-artifacts/ai-agent-sandbox_security.tar.sha256

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: dist/security-artifacts

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
