name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip yamllint
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Shellcheck
        run: shellcheck $(git ls-files 'scripts/*.sh')

      - name: Yamllint
        run: yamllint .

      - name: Markdownlint
        run: npx --yes markdownlint-cli@0.39 $(git ls-files '*.md')

      - name: Actionlint
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:latest

  build-and-smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: ./scripts/build-image.sh --image ai-agent-sandbox:ci

      - name: Smoke test
        env:
          IMAGE: ai-agent-sandbox:ci
        run: ./scripts/smoke-test.sh

  polyglot-smoke:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        group:
          - core
          - extended
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: ./scripts/build-image.sh --image ai-agent-sandbox:polyglot-${{ matrix.group }}

      - name: Polyglot smoke
        run: ./scripts/polyglot-smoke-test.sh --image ai-agent-sandbox:polyglot-${{ matrix.group }} --group ${{ matrix.group }}

  agent-smoke:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        agent:
          - codex
          - claude
          - gemini
          - aider
          - copilot
          - cursor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: ./scripts/build-image.sh --image ai-agent-sandbox:agent-${{ matrix.agent }}

      - name: Agent smoke
        run: ./scripts/agent-smoke-test.sh --image ai-agent-sandbox:agent-${{ matrix.agent }} --agent ${{ matrix.agent }}
