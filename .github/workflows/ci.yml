name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files

  build-and-smoke:
    runs-on: ubuntu-latest
    needs: lint
    env:
      CONTAINER_ENGINE: docker
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build image
        run: ./scripts/build-image.sh --image ai-agent-sandbox:ci

      - name: Smoke test
        env:
          IMAGE: ai-agent-sandbox:ci
        run: ./scripts/smoke-test.sh

  polyglot-smoke:
    runs-on: ubuntu-latest
    needs: lint
    env:
      CONTAINER_ENGINE: docker
    strategy:
      fail-fast: false
      matrix:
        group:
          - core
          - extended
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build image
        run: ./scripts/build-image.sh --image ai-agent-sandbox:polyglot-${{ matrix.group }}

      - name: Polyglot smoke
        run: ./scripts/polyglot-smoke-test.sh --image ai-agent-sandbox:polyglot-${{ matrix.group }} --group ${{ matrix.group }}

  agent-smoke:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    env:
      CONTAINER_ENGINE: docker
    strategy:
      fail-fast: false
      matrix:
        agent:
          - codex
          - claude
          - gemini
          - aider
          - copilot
          - cursor
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build image
        run: ./scripts/build-image.sh --image ai-agent-sandbox:agent-${{ matrix.agent }}

      - name: Agent smoke
        run: ./scripts/agent-smoke-test.sh --image ai-agent-sandbox:agent-${{ matrix.agent }} --agent ${{ matrix.agent }}
